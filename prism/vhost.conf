<VirtualHost *:80>
    ServerName compass.pupukkaltim.com

    DocumentRoot /var/www/html/public
    DirectoryIndex index.php
    <Directory "/var/www/html">
        AllowOverride all
        Require all granted
    </Directory>

    # Redirect HTTP to HTTPS for security
    # RewriteEngine On
    # RewriteCond %{HTTPS} off
    # RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    RewriteEngine On
    RewriteCond %{SERVER_NAME} =compass.pupukkaltim.com
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
   <VirtualHost *:443>
       ServerName compass.pupukkaltim.com

       DocumentRoot /var/www/html/public
       DirectoryIndex index.php

       <Directory "/var/www/html">
           Options Indexes Includes FollowSymLinks MultiViews
           AllowOverride all
           Order allow,deny
           Allow from All
           Require all granted
       </Directory>

        SSLEngine on
        SSLCertificateFile /var/www/html/ssl/ssl.crt
        SSLCertificateKeyFile /var/www/html/ssl/ssl.key

        ProxyPreserveHost On
        ProxyPass /app/ ws://127.0.0.1:8080/
        ProxyPassReverse /app/ ws://127.0.0.1:8080/

       ErrorLog ${APACHE_LOG_DIR}/error.log
       CustomLog ${APACHE_LOG_DIR}/access.log combined
   </VirtualHost>
</IfModule>
